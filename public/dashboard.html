<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clara</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Clara"/>
<meta name="theme-color" content="#8B5CF6"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#08090D;--s1:#0E0F16;--s2:#13141D;--s3:#1A1B26;--s4:#22243280;
  --accent:#8B5CF6;--accent2:#A855F7;--glow:rgba(139,92,246,.2);
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#F8F8FF;--text2:#9CA3AF;--text3:#4B5563;
  --r:14px;--r-sm:10px;--r-xs:7px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;font-size:14px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:54px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:20}
.menu-btn{width:34px;height:34px;border-radius:var(--r-sm);background:none;border:1px solid var(--border);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.menu-btn:hover{background:var(--s2);color:var(--text);border-color:var(--border2)}
.topbar-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px var(--glow)}
.topbar-info{flex:1;min-width:0}
.topbar-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.2}
.topbar-status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px}
.topbar-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.new-chat-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r-sm);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;box-shadow:0 4px 12px var(--glow);white-space:nowrap}
.new-chat-btn:hover{opacity:.85}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;width:260px;height:100%;background:var(--s1);border-right:1px solid var(--border2);z-index:50;transform:translateX(-100%);transition:transform .22s ease;display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.drawer-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px var(--glow)}
.drawer-logo-text{font-family:'Playfair Display',serif;font-size:18px}
.drawer-logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.drawer-close{margin-left:auto;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.06);border:none;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-close:hover{background:rgba(255,255,255,.1);color:var(--text2)}
.drawer-user{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s}
.drawer-user-row:hover{background:var(--s2)}
.drawer-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.drawer-user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-user-status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:1px}
.drawer-user-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}
.drawer-body{flex:1;overflow-y:auto;padding:8px}
.drawer-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:10px 10px 5px}
.drawer-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
.drawer-item:hover{background:var(--s2);color:var(--text)}
.drawer-item.active{background:rgba(139,92,246,.15);color:#C4B5FD}
.drawer-item-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.drawer-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center}
.drawer-sep{height:1px;background:var(--border);margin:6px 8px}

/* Personalidade */
.drawer-personality{padding:8px 10px 14px}
.dp-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding:0 2px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dp-btn{padding:7px 8px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.dp-btn:hover{border-color:rgba(139,92,246,.3);color:var(--text)}
.dp-btn.active{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.4);color:#C4B5FD}
.dp-btn-icon{display:block;font-size:14px;margin-bottom:2px}

/* ... (o resto do CSS continua igual ao original que você mandou) ... */
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <button class="menu-btn" onclick="openDrawer()" aria-label="Menu">☰</button>
  <div class="topbar-avatar">✨</div>
  <div class="topbar-info">
    <div class="topbar-name">Clara</div>
    <div class="topbar-status" id="topbar-status">Online agora</div>
  </div>
  <div class="topbar-right">
    <button class="new-chat-btn" onclick="newChat()">＋ Nova conversa</button>
  </div>
</header>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<nav class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-logo">✨</div>
    <div>
      <div class="drawer-logo-text">Clara</div>
      <div class="drawer-logo-sub">Sua assistente pessoal</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <!-- ... resto do drawer igual ... -->
  <div class="drawer-body">
    <!-- Navegação -->
    <div class="drawer-section">Navegação</div>
    <!-- itens de navegação... -->

    <div class="drawer-sep"></div>

    <!-- Personalidade -->
    <div class="drawer-personality">
      <div class="dp-title">Humor da Clara</div>
      <div class="dp-grid">
        <button class="dp-btn active" data-tom="carinhoso" onclick="setPersonalidade(this)"><span class="dp-btn-icon">🥰</span>Carinhosa</button>
        <button class="dp-btn" data-tom="direto" onclick="setPersonalidade(this)"><span class="dp-btn-icon">🎯</span>Direta</button>
        <button class="dp-btn" data-tom="sarcastico" onclick="setPersonalidade(this)"><span class="dp-btn-icon">😏</span>Sarcástica</button>
        <button class="dp-btn" data-tom="divertido" onclick="setPersonalidade(this)"><span class="dp-btn-icon">😂</span>Divertida</button>
      </div>
    </div>
  </div>
</nav>

</html>
